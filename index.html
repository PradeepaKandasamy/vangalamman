<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Choose Your Service</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    /* Background */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('./assets/bg.jpg') no-repeat center/cover;
      position: relative;
      overflow: hidden;
      /* Prevent scrollbars if any */
    }

    /* Dark transparent overlay with premium gradient */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.4),
          rgba(0, 0, 0, 0.7));
      backdrop-filter: blur(3px);
      /* Subtle blur for depth */
      z-index: 1;
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 1100px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      color: white;
    }

    /* Title */
    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.75;
      margin-bottom: 35px;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Card */
    .card {
      width: 240px;
      padding: 25px 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    /* Hover glow border */
    .card:hover {
      transform: translateY(-8px) scale(1.03);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    /* Logo */
    .card img {
      width: 75px;
      height: 75px;
      object-fit: contain;
      margin-bottom: 15px;
      border-radius: 10px;
      background: white;
      padding: 6px;
    }

    /* Title */
    .card h3 {
      font-size: 17px;
      margin-bottom: 6px;
    }

    /* Description */
    .card p {
      font-size: 13px;
      opacity: 0.8;
    }

    /* CTA effect */
    .card::after {
      content: "Open →";
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #facc15;
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover::after {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 24px;
      }

      .card {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Choose Your Service</h1>
    <p class="subtitle">Select a category to continue</p>

    <div class="cards">

      <div class="card" onclick="goTo('decors')">
        <img src="vangalamman-decors.jpg">
        <h3>Vangalamman Decors</h3>
        <p>Decoration & Event Services</p>
      </div>

      <div class="card" onclick="goTo('rs')">
        <img src="rsconstruction.jpg">
        <h3>RS Constructions</h3>
        <p>Construction & Projects</p>
      </div>

      <div class="card" onclick="goTo('upvc')">
        <img src="upvsc.png">
        <h3>Vangalamman UPVC</h3>
        <p>Windows & Fabrication</p>
      </div>

    </div>
  </div>

  <script>
    function goTo(type) {
      if (type === 'decors') {
        window.location.href = "./vangalamman_decors/index.html";
      }
      if (type === 'rs') {
        window.location.href = "./rsconstruction/home.html";
      }
      if (type === 'upvc') {
        window.location.href = "./vangalamman_upvsc/index.html";
      }
    }
  </script>

</body>

</html>
